# ============================================================
# Vantroxia Labs — App Stack: AegisRemit
# Location: /opt/vantroxia/apps/aegisremit
# Services match the GHCR images built by Vantroxia-Labs/remit CI:
#   remit-portal-api | remit-erp-api
# (sftp-api and admin are not built/deployed — see remit/ci.yml.)
# DB: aegisremit_db | Redis DB: 0 | RabbitMQ vhost: /aegisremit
# Provision first (from /opt/vantroxia/infra):
#   ./postgres/create-app-db.sh aegisremit '<pass>'
#   ./rabbitmq/create-app-vhost.sh aegisremit '<pass>'
# ============================================================
name: aegisremit

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-dotnet-common: &dotnet-common
  restart: unless-stopped
  networks:
    - proxy
    - backend
  deploy:
    resources:
      limits:
        memory: 512M
  logging: *default-logging

x-dotnet-env: &dotnet-env
  ASPNETCORE_ENVIRONMENT: Production
  ASPNETCORE_URLS: http://+:8080
  # Keys match the app's GetConnectionString(...) calls (env overrides appsettings).
  ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=aegisremit_db;Username=aegisremit;Password=${AEGISREMIT_DB_PASSWORD}
  ConnectionStrings__Redis: redis:6379,password=${REDIS_PASSWORD},defaultDatabase=0
  ConnectionStrings__RabbitMQ: amqp://aegisremit:${AEGISREMIT_MQ_PASSWORD}@rabbitmq:5672/%2Faegisremit
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_RESOURCE_ATTRIBUTES: deployment.environment=production
  TZ: Africa/Lagos

services:
  portal-api:
    <<: *dotnet-common
    image: ghcr.io/vantroxia-labs/remit-portal-api:${TAG_PORTAL:-latest}
    container_name: aegisremit-portal-api
    environment:
      <<: *dotnet-env
      OTEL_SERVICE_NAME: remit-portal-api
    labels:
      - traefik.enable=true
      - traefik.http.routers.remit-portal.rule=Host(`api.aegisremit.ng`)
      - traefik.http.routers.remit-portal.entrypoints=websecure
      - traefik.http.routers.remit-portal.tls.certresolver=le
      - traefik.http.routers.remit-portal.middlewares=secure-headers@file,api-ratelimit@file
      - traefik.http.services.remit-portal.loadbalancer.server.port=8080

  erp-api:
    <<: *dotnet-common
    image: ghcr.io/vantroxia-labs/remit-erp-api:${TAG_ERP:-latest}
    container_name: aegisremit-erp-api
    environment:
      <<: *dotnet-env
      OTEL_SERVICE_NAME: remit-erp-api
    labels:
      - traefik.enable=true
      - traefik.http.routers.remit-erp.rule=Host(`erp.aegisremit.ng`)
      - traefik.http.routers.remit-erp.entrypoints=websecure
      - traefik.http.routers.remit-erp.tls.certresolver=le
      - traefik.http.routers.remit-erp.middlewares=secure-headers@file,api-ratelimit@file
      - traefik.http.services.remit-erp.loadbalancer.server.port=8080

networks:
  proxy:
    external: true
  backend:
    external: true
