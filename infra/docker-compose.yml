# ============================================================
# Vantroxia Labs — Stack 2: Shared Infrastructure
# Location: /opt/vantroxia/infra
# Neutral naming: infra belongs to Vantroxia, not any product.
# One PostgreSQL / Redis / RabbitMQ / MinIO shared by ALL apps.
# ============================================================
name: infra

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ----------------------------------------------------------
  # PostgreSQL — single instance, one database + role per app
  # ----------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: postgres
      TZ: Africa/Lagos
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres:/scripts:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  # ----------------------------------------------------------
  # Redis — single instance, DB index per app (0,1,2…)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

  # ----------------------------------------------------------
  # RabbitMQ — single instance, one vhost per app
  # ----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_ADMIN_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_ADMIN_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./rabbitmq:/scripts:ro
    networks:
      - backend
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.rabbitmq.rule=Host(`mq.${BASE_DOMAIN}`)
      - traefik.http.routers.rabbitmq.entrypoints=websecure
      - traefik.http.routers.rabbitmq.tls.certresolver=le
      - traefik.http.routers.rabbitmq.middlewares=admin-allowlist@file
      - traefik.http.services.rabbitmq.loadbalancer.server.port=15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging

  # ----------------------------------------------------------
  # MinIO — S3-compatible object storage
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: https://minio.${BASE_DOMAIN}
    volumes:
      - minio-data:/data
    networks:
      - backend
      - proxy
    labels:
      - traefik.enable=true
      # Console (admin UI) — IP restricted
      - traefik.http.routers.minio-console.rule=Host(`minio.${BASE_DOMAIN}`)
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls.certresolver=le
      - traefik.http.routers.minio-console.middlewares=admin-allowlist@file
      - traefik.http.routers.minio-console.service=minio-console
      - traefik.http.services.minio-console.loadbalancer.server.port=9001
      # S3 API — public (presigned URLs must be reachable)
      - traefik.http.routers.minio-s3.rule=Host(`s3.${BASE_DOMAIN}`)
      - traefik.http.routers.minio-s3.entrypoints=websecure
      - traefik.http.routers.minio-s3.tls.certresolver=le
      - traefik.http.routers.minio-s3.service=minio-s3
      - traefik.http.services.minio-s3.loadbalancer.server.port=9000
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging

  # ---------------------------------------------------------
  # OpenObserve — self-hosted, open-source alternative to
  # SigNoz Cloud. Ingests logs, metrics AND traces over OTLP.
  # UI at logs.${BASE_DOMAIN} (IP-restricted).
  # ---------------------------------------------------------
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: openobserve
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: ${OPENOBSERVE_EMAIL}
      ZO_ROOT_USER_PASSWORD: ${OPENOBSERVE_PASSWORD}
      ZO_DATA_DIR: /data
      ZO_TELEMETRY: "false"
      # Cap on-disk telemetry so a 75GB NVMe shared with Postgres
      # and images never fills from unbounded retention.
      ZO_COMPACT_DATA_RETENTION_DAYS: "15"
    volumes:
      - openobserve-data:/data
    networks: [ backend, proxy ]
    labels:
      - traefik.enable=true
      - traefik.http.routers.o2.rule=Host(`logs.${BASE_DOMAIN}`)
      - traefik.http.routers.o2.entrypoints=websecure
      - traefik.http.routers.o2.tls.certresolver=le
      - traefik.http.routers.o2.middlewares=admin-allowlist@file
      - traefik.http.services.o2.loadbalancer.server.port=5080
    deploy:
      resources:
        limits:
          memory: 768M
    logging: *default-logging

  # ----------------------------------------------------------
  # OTEL Collector → OpenObserve
  # Apps send OTLP to otel-collector:4317 (gRPC) / 4318 (HTTP).
  # Uses the contrib distro; exporter config in ./otel/config.yaml.
  # ----------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      OPENOBSERVE_OTLP_AUTH: ${OPENOBSERVE_OTLP_AUTH}
    volumes:
      - ./otel/config.yaml:/etc/otel/config.yaml:ro
    networks:
      - backend
    depends_on:
      - openobserve
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  openobserve-data:

networks:
  proxy:
    external: true
  backend:
    external: true
