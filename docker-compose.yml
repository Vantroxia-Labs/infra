##############################################################################
# AegisRemit — Production Docker Compose
# Target: Contabo Cloud VPS 10 (4 vCPU / 8GB RAM / 75GB NVMe)
# Region: EU Region
# Domain: aegisremit.ng (via Cloudflare DNS)
# Database: Aiven Cloud PostgreSQL (external)
##############################################################################

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # REVERSE PROXY — Traefik v3
  # ═══════════════════════════════════════════════════════════════════════════
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP -> HTTPS redirect
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt via Cloudflare DNS challenge
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      # Access log
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
      # Metrics for SigNoz
      - --metrics.openTelemetry=true
      - --metrics.openTelemetry.address=otel-collector:4318
      - --metrics.openTelemetry.insecure=true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - traefik-logs:/var/log/traefik
    networks:
      - web
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      # Traefik dashboard at traefik.aegisremit.ng (protected by BasicAuth)
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)
      - traefik.http.routers.dashboard.entrypoints=websecure
      - traefik.http.routers.dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.middlewares=auth
      - traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION — Portal API (.NET 10)
  # Main frontend-facing API (multi-tenant SaaS portal)
  # ═══════════════════════════════════════════════════════════════════════════
  portal-api:
    image: ghcr.io/vantroxia-labs/remit-portal-api:${IMAGE_TAG:-latest}
    container_name: aegisremit-portal-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${AIVEN_CONNECTION_STRING}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD}
      - MinIO__UseSSL=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=aegisremit-portal-api
    networks:
      - web
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      - traefik.enable=true
      - traefik.http.routers.portal-api.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.portal-api.entrypoints=websecure
      - traefik.http.routers.portal-api.tls.certresolver=letsencrypt
      - traefik.http.services.portal-api.loadbalancer.server.port=8080
      # Rate limiting
      - traefik.http.routers.portal-api.middlewares=api-ratelimit
      - traefik.http.middlewares.api-ratelimit.ratelimit.average=100
      - traefik.http.middlewares.api-ratelimit.ratelimit.burst=50
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION — ERP API (.NET 10)
  # Enterprise Resource Planning integration API
  # ═══════════════════════════════════════════════════════════════════════════
  erp-api:
    image: ghcr.io/vantroxia-labs/remit-erp-api:${IMAGE_TAG:-latest}
    container_name: aegisremit-erp-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${AIVEN_CONNECTION_STRING}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD}
      - MinIO__UseSSL=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=aegisremit-erp-api
    networks:
      - web
      - internal
    deploy:
      resources:
        limits:
          memory: 384M
    labels:
      - traefik.enable=true
      - traefik.http.routers.erp-api.rule=Host(`erp.${DOMAIN}`)
      - traefik.http.routers.erp-api.entrypoints=websecure
      - traefik.http.routers.erp-api.tls.certresolver=letsencrypt
      - traefik.http.services.erp-api.loadbalancer.server.port=8080
      # Rate limiting
      - traefik.http.routers.erp-api.middlewares=erp-ratelimit
      - traefik.http.middlewares.erp-ratelimit.ratelimit.average=100
      - traefik.http.middlewares.erp-ratelimit.ratelimit.burst=50
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION — SFTP API (.NET 10)
  # File processing & SFTP integration API
  # ═══════════════════════════════════════════════════════════════════════════
  sftp-api:
    image: ghcr.io/vantroxia-labs/remit-sftp-api:${IMAGE_TAG:-latest}
    container_name: aegisremit-sftp-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${AIVEN_CONNECTION_STRING}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD}
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - MinIO__Endpoint=minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD}
      - MinIO__UseSSL=false
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=aegisremit-sftp-api
    networks:
      - web
      - internal
    deploy:
      resources:
        limits:
          memory: 384M
    labels:
      - traefik.enable=true
      - traefik.http.routers.sftp-api.rule=Host(`sftp-api.${DOMAIN}`)
      - traefik.http.routers.sftp-api.entrypoints=websecure
      - traefik.http.routers.sftp-api.tls.certresolver=letsencrypt
      - traefik.http.services.sftp-api.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN PORTAL — React/TypeScript frontend (+ landing pages)
  # ═══════════════════════════════════════════════════════════════════════════
  admin:
    image: ghcr.io/vantroxia-labs/remit-admin:${IMAGE_TAG:-latest}
    container_name: aegisremit-admin
    restart: unless-stopped
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 64M
    labels:
      - traefik.enable=true
      # app.aegisremit.ng + aegisremit.ng + www.aegisremit.ng
      - traefik.http.routers.admin.rule=Host(`app.${DOMAIN}`) || Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)
      - traefik.http.routers.admin.entrypoints=websecure
      - traefik.http.routers.admin.tls.certresolver=letsencrypt
      - traefik.http.services.admin.loadbalancer.server.port=80

  # ═══════════════════════════════════════════════════════════════════════════
  # CACHE — Redis 7
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: aegisremit-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # MESSAGE BROKER — RabbitMQ 3.13
  # ═══════════════════════════════════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: aegisremit-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - internal
      - web
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      # Management UI at rabbitmq.aegisremit.ng (BasicAuth protected)
      - traefik.enable=true
      - traefik.http.routers.rabbitmq.rule=Host(`rabbitmq.${DOMAIN}`)
      - traefik.http.routers.rabbitmq.entrypoints=websecure
      - traefik.http.routers.rabbitmq.tls.certresolver=letsencrypt
      - traefik.http.routers.rabbitmq.middlewares=auth
      - traefik.http.services.rabbitmq.loadbalancer.server.port=15672

  # ═══════════════════════════════════════════════════════════════════════════
  # OBJECT STORAGE — MinIO
  # ═══════════════════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: aegisremit-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - internal
      - web
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 5
    labels:
      # MinIO Console at minio.aegisremit.ng (BasicAuth protected)
      - traefik.enable=true
      - traefik.http.routers.minio-console.rule=Host(`minio.${DOMAIN}`)
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls.certresolver=letsencrypt
      - traefik.http.routers.minio-console.middlewares=auth
      - traefik.http.services.minio-console.loadbalancer.server.port=9001

  # ═══════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY — OpenTelemetry Collector
  # ═══════════════════════════════════════════════════════════════════════════
  # SigNoz will be deployed standalone later.
  # The collector accepts telemetry from all services now and
  # forwards to SigNoz once it's available (drops gracefully until then).
  # ═══════════════════════════════════════════════════════════════════════════
  otel-collector:
    image: signoz/signoz-otel-collector:0.102.12
    container_name: aegisremit-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      - traefik.enable=false

# ═════════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═════════════════════════════════════════════════════════════════════════════
networks:
  web:
    name: aegisremit-web
  internal:
    name: aegisremit-internal
    internal: true   # No external access — services talk only via Traefik

# ═════════════════════════════════════════════════════════════════════════════
# VOLUMES
# ═════════════════════════════════════════════════════════════════════════════
volumes:
  redis-data:
  rabbitmq-data:
  minio-data:
  traefik-certs:
  traefik-logs:
