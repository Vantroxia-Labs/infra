# ============================================================
# Vantroxia Labs — App Stack: GymMateHub
# Location: /opt/vantroxia/apps/gymmate
# DB: gymmate_db | Redis DB: 1 | RabbitMQ vhost: /gymmate
# Provision first (from /opt/vantroxia/infra):
#   ./postgres/create-app-db.sh gymmate '<pass>'
#   ./rabbitmq/create-app-vhost.sh gymmate '<pass>'
# ============================================================
name: gymmate

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    image: ghcr.io/vantroxia-labs/gymmate-api:${TAG:-latest}
    container_name: gymmate-api
    restart: unless-stopped
    networks:
      - proxy
      - backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=gymmate_db;Username=gymmate;Password=${GYMMATE_DB_PASSWORD}
      Redis__Configuration: redis:6379,password=${REDIS_PASSWORD},defaultDatabase=1
      RabbitMQ__Host: rabbitmq
      RabbitMQ__VirtualHost: /gymmate
      RabbitMQ__Username: gymmate
      RabbitMQ__Password: ${GYMMATE_MQ_PASSWORD}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: gymmate-api
      TZ: Africa/Lagos
    labels:
      - traefik.enable=true
      - traefik.http.routers.gymmate-api.rule=Host(`api.gymmate.${BASE_DOMAIN}`)
      - traefik.http.routers.gymmate-api.entrypoints=websecure
      - traefik.http.routers.gymmate-api.tls.certresolver=le
      - traefik.http.routers.gymmate-api.middlewares=secure-headers@file,api-ratelimit@file
      - traefik.http.services.gymmate-api.loadbalancer.server.port=8080
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging

  web:
    image: ghcr.io/vantroxia-labs/gymmate-web:${TAG_WEB:-latest}
    container_name: gymmate-web
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.gymmate-web.rule=Host(`gymmate.${BASE_DOMAIN}`)
      - traefik.http.routers.gymmate-web.entrypoints=websecure
      - traefik.http.routers.gymmate-web.tls.certresolver=le
      - traefik.http.routers.gymmate-web.middlewares=secure-headers@file
      - traefik.http.services.gymmate-web.loadbalancer.server.port=80
    deploy:
      resources:
        limits:
          memory: 64M
    logging: *default-logging

networks:
  proxy:
    external: true
  backend:
    external: true
