##############################################################################
# AegisRemit — Infrastructure Services (docker-compose.yml)
# Target: Contabo Cloud VPS 10 (4 vCPU / 8GB RAM / 75GB NVMe)
# Region: EU Region
# Domain: aegisremit.ng (via Cloudflare DNS)
# Database: Aiven Cloud PostgreSQL (external)
#
# This file contains ONLY infrastructure services.
# Application services live in docker-compose.apps.yml.
#
# Usage:
#   Infra only:  docker compose up -d
#   Full stack:  docker compose -f docker-compose.yml -f docker-compose.apps.yml up -d
##############################################################################

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # REVERSE PROXY — Traefik v3
  # ═══════════════════════════════════════════════════════════════════════════
  traefik:
    image: traefik:v3.1
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # HTTP -> HTTPS redirect
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt via Cloudflare DNS challenge
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      # Access log
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
      # Metrics for SigNoz
      - --metrics.openTelemetry=true
      - --metrics.openTelemetry.address=otel-collector:4318
      - --metrics.openTelemetry.insecure=true
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
      - traefik-logs:/var/log/traefik
    networks:
      - web
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      # Traefik dashboard at traefik.aegisremit.ng (protected by BasicAuth)
      - traefik.enable=true
      - traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)
      - traefik.http.routers.dashboard.entrypoints=websecure
      - traefik.http.routers.dashboard.tls.certresolver=letsencrypt
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.middlewares=auth
      - traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}

  # ═══════════════════════════════════════════════════════════════════════════
  # CACHE — Redis 7
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: aegisremit-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # MESSAGE BROKER — RabbitMQ 3.13
  # ═══════════════════════════════════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: aegisremit-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - internal
      - web
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5
    labels:
      # Management UI at rabbitmq.aegisremit.ng (BasicAuth protected)
      - traefik.enable=true
      - traefik.http.routers.rabbitmq.rule=Host(`rabbitmq.${DOMAIN}`)
      - traefik.http.routers.rabbitmq.entrypoints=websecure
      - traefik.http.routers.rabbitmq.tls.certresolver=letsencrypt
      - traefik.http.routers.rabbitmq.middlewares=auth
      - traefik.http.services.rabbitmq.loadbalancer.server.port=15672

  # ═══════════════════════════════════════════════════════════════════════════
  # OBJECT STORAGE — MinIO
  # ═══════════════════════════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: aegisremit-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - internal
      - web
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 5
    labels:
      # MinIO Console at minio.aegisremit.ng (BasicAuth protected)
      - traefik.enable=true
      - traefik.http.routers.minio-console.rule=Host(`minio.${DOMAIN}`)
      - traefik.http.routers.minio-console.entrypoints=websecure
      - traefik.http.routers.minio-console.tls.certresolver=letsencrypt
      - traefik.http.routers.minio-console.middlewares=auth
      - traefik.http.services.minio-console.loadbalancer.server.port=9001

  # ═══════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY — OpenTelemetry Collector
  # ═══════════════════════════════════════════════════════════════════════════
  # SigNoz will be deployed standalone later.
  # The collector accepts telemetry from all services now and
  # forwards to SigNoz once it's available (drops gracefully until then).
  # ═══════════════════════════════════════════════════════════════════════════
  otel-collector:
    image: signoz/signoz-otel-collector:0.102.12
    container_name: aegisremit-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      - traefik.enable=false

  # ═══════════════════════════════════════════════════════════════════════════
  # SFTP SERVER — SFTPGo v2
  # Managed SFTP server with REST API for user provisioning.
  # External auth delegates credential checks to sftp-api (apps compose).
  # NOTE: SFTP auth requires sftp-api to be running (from docker-compose.apps.yml).
  # ═══════════════════════════════════════════════════════════════════════════
  sftpgo:
    image: sftpgo/sftpgo:v2
    container_name: aegisremit-sftpgo
    restart: unless-stopped
    ports:
      # SFTP — exposed directly on host (not HTTP, can't go through Traefik)
      - "2222:2022"
    environment:
      # SFTP binding
      - SFTPGO_SFTPD__BINDINGS__0__PORT=2022
      - SFTPGO_SFTPD__BINDINGS__0__ADDRESS=0.0.0.0
      - SFTPGO_SFTPD__MAX_AUTH_TRIES=3
      # HTTP API & Web Admin binding
      - SFTPGO_HTTPD__BINDINGS__0__PORT=8080
      - SFTPGO_HTTPD__BINDINGS__0__ADDRESS=0.0.0.0
      - SFTPGO_HTTPD__BINDINGS__0__ENABLE_WEB_ADMIN=true
      - SFTPGO_HTTPD__BINDINGS__0__ENABLE_WEB_CLIENT=false
      - SFTPGO_HTTPD__BINDINGS__0__ENABLE_REST_API=true
      # Data provider — in-memory; auth delegated to sftp-api
      - SFTPGO_DATA_PROVIDER__DRIVER=memory
      - SFTPGO_DATA_PROVIDER__EXTERNAL_AUTH_HOOK=http://sftp-api:8080/api/sftp-auth/check-credentials
      - SFTPGO_DATA_PROVIDER__EXTERNAL_AUTH_SCOPE=1
      - SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_DIR=true
      # General
      - SFTPGO_COMMON__IDLE_TIMEOUT=15
      # Default admin credentials (change after first login)
      - SFTPGO_DEFAULT_ADMIN_USERNAME=${SFTPGO_ADMIN_USER}
      - SFTPGO_DEFAULT_ADMIN_PASSWORD=${SFTPGO_ADMIN_PASSWORD}
    volumes:
      - sftp-data:/srv/sftpgo/data
      - sftpgo-backups:/srv/sftpgo/backups
    networks:
      - internal
      - web
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "sftpgo", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 5
    labels:
      # SFTPGo Web Admin at sftpgo.aegisremit.ng (BasicAuth protected)
      - traefik.enable=true
      - traefik.http.routers.sftpgo.rule=Host(`sftpgo.${DOMAIN}`)
      - traefik.http.routers.sftpgo.entrypoints=websecure
      - traefik.http.routers.sftpgo.tls.certresolver=letsencrypt
      - traefik.http.routers.sftpgo.middlewares=auth
      - traefik.http.services.sftpgo.loadbalancer.server.port=8080

# ═════════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═════════════════════════════════════════════════════════════════════════════
networks:
  web:
    name: aegisremit-web
  internal:
    name: aegisremit-internal
    internal: true   # No external access — services talk only via Traefik

# ═════════════════════════════════════════════════════════════════════════════
# VOLUMES
# ═════════════════════════════════════════════════════════════════════════════
volumes:
  redis-data:
  rabbitmq-data:
  minio-data:
  traefik-certs:
  traefik-logs:
  sftp-data:
  sftpgo-backups:
