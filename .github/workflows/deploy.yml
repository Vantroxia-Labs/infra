# ═══════════════════════════════════════════════════════════════════════════
# Vantroxia-Labs/vantroxia-infra — Deploy Pipeline
# Triggers:
#   - repository_dispatch from app CI pipelines (automatic)
#   - workflow_dispatch for manual deployments
# Steps: SSH to VPS → sync infra repo → pull images → restart services
# Layout: /opt/vantroxia/{traefik,infra,apps/<app>} — per-stack .env files
# ═══════════════════════════════════════════════════════════════════════════
name: Deploy

on:
  repository_dispatch:
    types: [deploy]

  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all            # all AegisRemit services
          - all-apis       # AegisRemit APIs only
          - portal-api
          - erp-api
          - sftp-api
          - admin
          - gymmate        # whole GymMate stack
          - aegistrader    # whole AegisTrader (Spring Boot) stack
          - infra
          - traefik
      image_tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'

env:
  DEPLOY_DIR: /opt/vantroxia

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # Push compose files/configs from this repo to the VPS.
      # The VPS needs NO GitHub credentials — the runner is the courier.
      # .env files live only on the VPS and are never touched by this sync.
      - name: Sync infra files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "traefik,infra,apps,scripts"
          target: /opt/vantroxia
          overwrite: true

      - name: Determine what to deploy
        id: target
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            SERVICE="${{ github.event.client_payload.service }}"
            TAG="${{ github.event.client_payload.image_tag }}"
            TRIGGERED_BY="${{ github.event.client_payload.triggered_by }}"
            COMMIT="${{ github.event.client_payload.commit_sha }}"
          else
            SERVICE="${{ inputs.service }}"
            TAG="${{ inputs.image_tag }}"
            TRIGGERED_BY="manual"
            COMMIT="manual"
          fi
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "tag=${TAG:-latest}" >> $GITHUB_OUTPUT
          echo "triggered_by=$TRIGGERED_BY" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "Deploying service=$SERVICE tag=$TAG triggered_by=$TRIGGERED_BY"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            SERVICE="${{ steps.target.outputs.service }}"
            TAG="${{ steps.target.outputs.tag }}"

            echo "═══════════════════════════════════════════"
            echo "  Deploying: $SERVICE (tag: $TAG)"
            echo "  Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "═══════════════════════════════════════════"

            # Ensure provisioning scripts stay executable after sync
            chmod +x ${{ env.DEPLOY_DIR }}/scripts/*.sh \
                     ${{ env.DEPLOY_DIR }}/infra/postgres/*.sh \
                     ${{ env.DEPLOY_DIR }}/infra/rabbitmq/*.sh 2>/dev/null || true

            # ── Helpers ─────────────────────────────────────────────
            # Each stack dir has its own .env; compose auto-loads it.
            deploy_service() {
              local svc=$1
              local dir=$2
              echo "→ Deploying $svc in $dir..."
              cd ${{ env.DEPLOY_DIR }}/$dir
              docker compose pull "$svc"
              docker compose up -d --no-deps "$svc"
              echo "→ Waiting for $svc health..."
              sleep 5
              docker compose ps "$svc"
            }

            deploy_stack() {
              local dir=$1
              echo "→ Deploying full stack in $dir..."
              cd ${{ env.DEPLOY_DIR }}/$dir
              docker compose pull
              docker compose up -d --remove-orphans
              sleep 5
              docker compose ps
            }

            # EF Core migrations as a one-shot before rolling DB-backed apps.
            # Runs on the shared `backend` network against `postgres`.
            # Requires DB_CONNECTION_STRING in apps/aegisremit/.env, e.g.:
            #   DB_CONNECTION_STRING=Host=postgres;Port=5432;Database=aegisremit_db;Username=aegisremit;Password=...
            run_migrations() {
              echo "→ Applying database migrations (remit-migrator:$TAG)..."
              local db_conn
              db_conn=$(grep -E '^DB_CONNECTION_STRING=' ${{ env.DEPLOY_DIR }}/apps/aegisremit/.env | head -1 | cut -d= -f2-)
              if [ -z "$db_conn" ]; then
                echo "✗ DB_CONNECTION_STRING not found in apps/aegisremit/.env"
                exit 1
              fi
              docker pull ghcr.io/vantroxia-labs/remit-migrator:$TAG
              docker run --rm --network backend \
                -e "ConnectionStrings__DefaultConnection=$db_conn" \
                ghcr.io/vantroxia-labs/remit-migrator:$TAG
              echo "→ Migrations applied successfully."
            }

            export IMAGE_TAG="$TAG"

            case "$SERVICE" in
              portal-api|erp-api|sftp-api)
                run_migrations
                deploy_service "$SERVICE" "apps/aegisremit"
                ;;
              admin)
                deploy_service "admin" "apps/aegisremit"
                ;;
              all-apis)
                run_migrations
                cd ${{ env.DEPLOY_DIR }}/apps/aegisremit
                docker compose pull portal-api erp-api sftp-api
                docker compose up -d --no-deps portal-api erp-api sftp-api
                sleep 5
                docker compose ps
                ;;
              all)
                run_migrations
                deploy_stack "apps/aegisremit"
                ;;
              gymmate)
                deploy_stack "apps/gymmate"
                ;;
              aegistrader)
                deploy_stack "apps/aegistrader"
                ;;
              infra)
                deploy_stack "infra"
                ;;
              traefik)
                deploy_stack "traefik"
                ;;
              *)
                echo "✗ Unknown service: $SERVICE"
                exit 1
                ;;
            esac

            docker image prune -f

            echo "═══════════════════════════════════════════"
            echo "  Deploy complete!"
            echo "═══════════════════════════════════════════"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "── Health checks ──"
            curl -sf https://api.aegisremit.ng/health > /dev/null && echo " ✓ Portal API healthy" || echo " ✗ Portal API unhealthy"
            curl -sf https://erp.aegisremit.ng/health > /dev/null && echo " ✓ ERP API healthy"    || echo " ✗ ERP API unhealthy"
            curl -sf https://app.aegisremit.ng > /dev/null        && echo " ✓ Admin healthy"      || echo " ✗ Admin unhealthy"
            echo ""
            echo "── Running containers ──"
            for stack in traefik infra apps/aegisremit apps/gymmate apps/aegistrader; do
              dir=/opt/vantroxia/$stack
              [ -f "$dir/docker-compose.yml" ] || continue
              echo "--- $stack ---"
              cd "$dir" && docker compose ps --format "table {{.Name}}\t{{.Status}}\t{{.Ports}}" || true
            done
            echo ""
            echo "── Memory ──"
            docker stats --no-stream --format "table {{.Name}}\t{{.MemUsage}}" | head -20

      # TODO: Add Slack/Discord notification on success/failure