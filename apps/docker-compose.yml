##############################################################################
# AegisRemit — Application / Domain Services (apps/docker-compose.yml)
# Target: Contabo Cloud VPS 10 (4 vCPU / 8GB RAM / 75GB NVMe)
# Domain: aegisremit.ng (via Cloudflare DNS)
#
# Requires infrastructure from ../infra/docker-compose.yml to be running.
# Requires Traefik from ../traefik/docker-compose.yml to be running.
#
# Usage:
#   cd /opt/aegisremit/apps
#   docker compose --env-file ../.env up -d
##############################################################################

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION — Portal API (.NET 10)
  # Main frontend-facing API (multi-tenant SaaS portal)
  # ═══════════════════════════════════════════════════════════════════════════
  portal-api:
    image: ghcr.io/vantroxia-labs/remit-portal-api:${IMAGE_TAG:-latest}
    container_name: aegisremit-portal-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      # Container names for cross-stack service references
      - ConnectionStrings__Redis=aegisremit-redis:6379,password=${REDIS_PASSWORD}
      - RabbitMQ__Host=aegisremit-rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - MinIO__Endpoint=aegisremit-minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD}
      - MinIO__UseSSL=false
      # JWT
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      # Payload encryption
      - Encryption__Key=${ENCRYPTION_KEY}
      - Encryption__Iv=${ENCRYPTION_IV}
      - PAYLOAD_ENCRYPTION_KEY=${PAYLOAD_ENCRYPTION_KEY}
      # FIRS / NRS API integration
      - FIRSHttpClient__BaseUrl=${FIRS_HTTPCLNT_BASEURL}
      - FIRSApiConfiguration__DefaultConfiguration__BaseUrl=${FIRS_HTTPCLNT_BASEURL}
      - FIRSApiConfiguration__DefaultConfiguration__ApiKey=${FIRS_API_KEY}
      - FIRSApiConfiguration__DefaultConfiguration__ApiSecret=${FIRS_API_SECRET}
      - FIRSApiConfiguration__DefaultConfiguration__Environment=Production
      # Interswitch access-point
      - InterswitchHttpClient__BaseUrl=${INTERSWITCH_BASEURL}
      # SFTPGo internal API
      - SFTPGoService__Endpoint=http://aegisremit-sftpgo:8080
      - SFTPGoService__Host=aegisremit-sftpgo
      - SFTPGoService__Port=2022
      - SFTPGoService__Username=${SFTPGO_ADMIN_USER}
      - SFTPGoService__Password=${SFTPGO_ADMIN_PASSWORD}
      # App URLs
      - App__BaseUrl=https://api.${DOMAIN}
      - App__PortalUrl=https://app.${DOMAIN}
      - ErpApi__BaseUrl=http://aegisremit-erp-api:8080
      # CORS — override first 3 entries of the appsettings.json array with production origins
      - Cors__AllowedOrigins__0=https://${DOMAIN}
      - Cors__AllowedOrigins__1=https://www.${DOMAIN}
      - Cors__AllowedOrigins__2=https://app.${DOMAIN}
      # Observability
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aegisremit-otel-collector:4317
      - OTEL_SERVICE_NAME=aegisremit-portal-api
      - SigNoz__Endpoint=http://aegisremit-otel-collector:4317
    networks:
      - web
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    labels:
      - traefik.enable=true
      - traefik.http.routers.portal-api.rule=Host(`api.${DOMAIN}`)
      - traefik.http.routers.portal-api.entrypoints=websecure
      - traefik.http.routers.portal-api.tls.certresolver=letsencrypt
      - traefik.http.services.portal-api.loadbalancer.server.port=8080
      # Rate limiting
      - traefik.http.routers.portal-api.middlewares=api-ratelimit
      - traefik.http.middlewares.api-ratelimit.ratelimit.average=100
      - traefik.http.middlewares.api-ratelimit.ratelimit.burst=50
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ═══════════════════════════════════════════════════════════════════════════
  # APPLICATION — ERP API (.NET 10)
  # Enterprise Resource Planning integration API
  # ═══════════════════════════════════════════════════════════════════════════
  erp-api:
    image: ghcr.io/vantroxia-labs/remit-erp-api:${IMAGE_TAG:-latest}
    container_name: aegisremit-erp-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      # Container names for cross-stack service references
      - ConnectionStrings__Redis=aegisremit-redis:6379,password=${REDIS_PASSWORD}
      - RabbitMQ__Host=aegisremit-rabbitmq
      - RabbitMQ__Username=${RABBITMQ_USER}
      - RabbitMQ__Password=${RABBITMQ_PASSWORD}
      - MinIO__Endpoint=aegisremit-minio:9000
      - MinIO__AccessKey=${MINIO_ROOT_USER}
      - MinIO__SecretKey=${MINIO_ROOT_PASSWORD}
      - MinIO__UseSSL=false
      # JWT
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      # Payload encryption
      - Encryption__Key=${ENCRYPTION_KEY}
      - Encryption__Iv=${ENCRYPTION_IV}
      - PAYLOAD_ENCRYPTION_KEY=${PAYLOAD_ENCRYPTION_KEY}
      # FIRS / NRS API integration
      - FIRSHttpClient__BaseUrl=${FIRS_HTTPCLNT_BASEURL}
      - FIRSApiConfiguration__DefaultConfiguration__BaseUrl=${FIRS_HTTPCLNT_BASEURL}
      - FIRSApiConfiguration__DefaultConfiguration__ApiKey=${FIRS_API_KEY}
      - FIRSApiConfiguration__DefaultConfiguration__ApiSecret=${FIRS_API_SECRET}
      - FIRSApiConfiguration__DefaultConfiguration__Environment=Production
      # Interswitch access-point
      - InterswitchHttpClient__BaseUrl=${INTERSWITCH_BASEURL}
      # App URLs
      - App__BaseUrl=https://erp.${DOMAIN}
      - ErpApi__BaseUrl=http://aegisremit-erp-api:8080
      # CORS
      - Cors__AllowedOrigins__0=https://${DOMAIN}
      - Cors__AllowedOrigins__1=https://www.${DOMAIN}
      - Cors__AllowedOrigins__2=https://app.${DOMAIN}
      # Observability
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://aegisremit-otel-collector:4317
      - OTEL_SERVICE_NAME=aegisremit-erp-api
    networks:
      - web
      - internal
    deploy:
      resources:
        limits:
          memory: 384M
    labels:
      - traefik.enable=true
      - traefik.http.routers.erp-api.rule=Host(`erp.${DOMAIN}`)
      - traefik.http.routers.erp-api.entrypoints=websecure
      - traefik.http.routers.erp-api.tls.certresolver=letsencrypt
      - traefik.http.services.erp-api.loadbalancer.server.port=8080
      # Rate limiting
      - traefik.http.routers.erp-api.middlewares=erp-ratelimit
      - traefik.http.middlewares.erp-ratelimit.ratelimit.average=100
      - traefik.http.middlewares.erp-ratelimit.ratelimit.burst=50
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # NOTE: SFTP API (sftp-api) is intentionally NOT deployed. Customer invoices
  # are uploaded through the admin UI and pushed to NRS by the Portal API, so
  # the SFTP ingestion path is unused. The project source remains in the remit
  # repo and can be re-enabled later. (SFTPGo still runs in the infra stack.)

  # ═══════════════════════════════════════════════════════════════════════════
  # ADMIN PORTAL — React/TypeScript frontend (+ landing pages)
  # ═══════════════════════════════════════════════════════════════════════════
  admin:
    image: ghcr.io/vantroxia-labs/remit-admin:${IMAGE_TAG:-latest}
    container_name: aegisremit-admin
    restart: unless-stopped
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 64M
    labels:
      - traefik.enable=true
      # app.aegisremit.ng + aegisremit.ng + www.aegisremit.ng
      - traefik.http.routers.admin.rule=Host(`app.${DOMAIN}`) || Host(`${DOMAIN}`) || Host(`www.${DOMAIN}`)
      - traefik.http.routers.admin.entrypoints=websecure
      - traefik.http.routers.admin.tls.certresolver=letsencrypt
      - traefik.http.services.admin.loadbalancer.server.port=80

# ═════════════════════════════════════════════════════════════════════════════
# NETWORKS — created externally by bootstrap-vps.sh
# ═════════════════════════════════════════════════════════════════════════════
networks:
  web:
    name: aegisremit-web
    external: true
  internal:
    name: aegisremit-internal
    external: true

# No named volumes in the apps stack. (sftp-data lives in the infra stack with
# SFTPGo; it was only mounted by the now-removed sftp-api service.)
