# ═══════════════════════════════════════════════════════════════════════════
# Vantroxia-Labs/admin — CI Pipeline
# Triggers: push to main, pull requests
# Steps: build → Docker build → push to ghcr.io → trigger deploy
# ═══════════════════════════════════════════════════════════════════════════
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/vantroxia-labs/remit-admin

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Step 1: Build + Lint
  # ─────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.aegisremit.ng/api/v1
          VITE_USE_MOCK: "false"

  # ─────────────────────────────────────────────────────────────────────────
  # Step 2: Build + Push Docker Image (only on main push)
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_tag=$SHA" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tags.outputs.sha_tag }}
          build-args: |
            VITE_API_BASE_URL=https://api.aegisremit.ng/api/v1
            VITE_USE_MOCK=false

  # ─────────────────────────────────────────────────────────────────────────
  # Step 3: Trigger deployment in infra repo
  # ─────────────────────────────────────────────────────────────────────────
  trigger-deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy workflow
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          repository: Vantroxia-Labs/infra
          event-type: deploy
          client-payload: |
            {
              "service": "admin",
              "image_tag": "latest",
              "triggered_by": "${{ github.repository }}",
              "commit_sha": "${{ github.sha }}"
            }
