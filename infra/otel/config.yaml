# SigNoz OTEL Collector → SigNoz Cloud
# Apps on the `backend` network send to:
#   gRPC: http://otel-collector:4317
#   HTTP: http://otel-collector:4318
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  hostmetrics:
    collection_interval: 60s
    scrapers:
      cpu: {}
      memory: {}
      disk: {}
      filesystem: {}
      network: {}

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 180
    spike_limit_mib: 40
  resourcedetection:
    detectors: [system]
  batch:
    send_batch_size: 1024
    timeout: 10s

exporters:
  otlp:
    endpoint: ${env:SIGNOZ_ENDPOINT}   # e.g. ingest.eu.signoz.cloud:443
    tls:
      insecure: false
    headers:
      signoz-ingestion-key: ${env:SIGNOZ_INGESTION_KEY}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp]
    metrics:
      receivers: [otlp, hostmetrics]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlp]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp]
