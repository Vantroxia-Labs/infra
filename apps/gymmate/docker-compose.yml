# ============================================================
# Vantroxia Labs — App Stack: GymMateHub (Spring Boot / Java 21)
# Source: github.com/GymmateHub/Backend
# Location: /opt/vantroxia/apps/gymmate
# DB: gymmate_db | Redis DB: 1 | RabbitMQ: not used
# Schema is managed by Flyway inside the app on startup
# (FLYWAY_ENABLED=true), so no separate migrator runs.
# Provision first (from /opt/vantroxia/infra):
#   ./postgres/create-app-db.sh gymmate '<pass>'
# ============================================================
name: gymmate

services:
  api:
    image: ghcr.io/gymmatehub/gymmate-backend:${TAG:-latest}
    container_name: gymmate-api
    restart: unless-stopped
    networks:
      - proxy
      - backend
    environment:
      # ── JVM caps (8GB box shared with Postgres/Redis/telemetry) ──
      JAVA_TOOL_OPTIONS: >-
        -Xms256m -Xmx512m
        -XX:MaxMetaspaceSize=128m
      SPRING_PROFILES_ACTIVE: production
      APP_PORT: "8080"
      # ── PostgreSQL ──
      PG_URI: jdbc:postgresql://postgres:5432/gymmate_db
      DB_DRIVER: org.postgresql.Driver
      PG_USER: gymmate
      PG_PASSWORD: ${GYMMATE_DB_PASSWORD}
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      # App default is 'update' (application.yml: ${JPA_DDL_AUTO:update}). Flyway
      # (V1..V12) owns the versioned schema; Hibernate 'update' reconciles entity
      # drift on top. 'validate' is not viable here — the entity model and the
      # Flyway migrations have known drift (e.g. api_rate_limits.is_active), so
      # validate aborts startup. This mirrors how the app ran previously.
      JPA_DDL_AUTO: update
      SHOW_SQL: "false"
      # ── Flyway (app owns its schema migrations) ──
      FLYWAY_ENABLED: "true"
      # ── Redis (shared instance, dedicated logical DB index) ──
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_DATABASE: "1"
      # ── Security / JWT ──
      JWT_SECRET: ${GYMMATE_JWT_SECRET}
      JWT_EXPIRATION: ${GYMMATE_JWT_EXPIRATION:-86400000}
      JWT_REFRESH_EXPIRATION: ${GYMMATE_JWT_REFRESH_EXPIRATION:-604800000}
      # ── CORS / Frontend ──
      CORS_ALLOWED_ORIGINS: ${GYMMATE_CORS_ALLOWED_ORIGINS:-https://gymmate.vantroxialabs.com}
      CORS_ALLOW_CREDENTIALS: "true"
      FRONTEND_URL: ${GYMMATE_FRONTEND_URL:-https://gymmate.vantroxialabs.com}
      # ── Bootstrap admin ──
      APP_ADMIN_EMAIL: ${GYMMATE_ADMIN_EMAIL:-}
      APP_ADMIN_PASSWORD: ${GYMMATE_ADMIN_PASSWORD:-}
      # ── Mail (Namecheap/cPanel SMTP) — blank-safe; health check off in prod ──
      MAIL_HOST: ${GYMMATE_MAIL_HOST:-}
      MAIL_PORT: ${GYMMATE_MAIL_PORT:-587}
      MAIL_PASSWORD: ${GYMMATE_MAIL_PASSWORD:-}
      # ── Stripe — blank-safe for first boot ──
      STRIPE_API_KEY: ${GYMMATE_STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${GYMMATE_STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CONNECT_WEBHOOK_SECRET: ${GYMMATE_STRIPE_CONNECT_WEBHOOK_SECRET:-}
      # ── Telemetry ──
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: gymmate-api
      TZ: Africa/Lagos
    labels:
      - traefik.enable=true
      - traefik.http.routers.gymmate-api.rule=Host(`api.gymmate.${BASE_DOMAIN}`)
      - traefik.http.routers.gymmate-api.entrypoints=websecure
      - traefik.http.routers.gymmate-api.tls.certresolver=le
      - traefik.http.routers.gymmate-api.middlewares=secure-headers@file,api-ratelimit@file
      - traefik.http.services.gymmate-api.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true
  backend:
    external: true
